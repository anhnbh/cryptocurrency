services:
  portfolio:
    build: .
    container_name: local-crypto-portfolio
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite:///./data/portfolio.db
      - PRICE_SYNC_ENABLED=true
      - PRICE_SYNC_INTERVAL_SECONDS=300
      - PRICE_STREAM_ENABLED=true
      - TRACKED_SYMBOLS_REFRESH_SECONDS=30
      - BINANCE_API_BASE=https://api.binance.com
      - BINANCE_WS_BASE=wss://stream.binance.com:9443
      - BINANCE_WS_STREAM=!miniTicker@arr
      - PRICE_SYNC_QUOTE_ASSET=USDT
    volumes:
      - portfolio_data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: local-crypto-portfolio-nginx
    depends_on:
      - portfolio
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  portfolio_data:
