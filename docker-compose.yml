services:
  portfolio:
    build: .
    container_name: local-crypto-portfolio
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite:///./data/portfolio.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: local-crypto-portfolio-nginx
    depends_on:
      - portfolio
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
